name: Fabrica_Gemma_Pro
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with: { java-version: '17', distribution: 'temurin' }
      - name: Inyeccion y Compilacion
        run: |
          mkdir -p app/src/main
          # 1. Creamos el Manifiesto Maestro
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.dominick.gemma.pro">
              <application android:label="Gemma 4 Pro" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleInstance">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.HOME" />
                          <category android:name="android.intent.category.DEFAULT" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          # 2. Configuramos la maquinaria
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dominick.gemma.pro'
              compileSdk 34
              defaultConfig { applicationId "com.dominick.gemma.pro"; minSdk 26; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          EOF
          # 3. ¡A fabricar!
          chmod +x gradlew || true
          gradle assembleDebug
      - name: Entregar APK
        uses: actions/upload-artifact@v3
        with:
          name: Gemma-4-Pro-Final
          path: "app/build/outputs/apk/debug/*.apk"
          
